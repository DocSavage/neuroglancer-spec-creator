[workspace]
name = "neuroglancer-spec-creator"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10,<3.13"

[pypi-dependencies]
manim = ">=0.18.0"
click = ">=8.1.0"
pytest = ">=8.0"

[tasks]
generate = "python cli.py generate"
animate = "python cli.py animate"
test = "pytest tests/ -v"
